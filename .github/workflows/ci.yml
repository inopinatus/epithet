name: CI

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Lint runs on MRI only.
  test:
    name: test (${{ matrix.ruby }}${{ matrix.ruby_box && ' · Ruby Box' }}${{ matrix.rubyopt && format(' · {0}', matrix.rubyopt) }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: ${{ matrix.advisory || false }}
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.4", "4.0", "truffleruby", "jruby"]
        rubyopt: [""]
        ruby_box: [""]
        include:
          - { ruby: "4.0", rubyopt: "", ruby_box: "1" }
          - { ruby: "4.0", rubyopt: "--yjit" }
          - { ruby: "4.0", rubyopt: "--zjit", advisory: true }
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rake test
        env:
          EPITHET_TEST_THREADS: "16"
          EPITHET_TEST_ROUNDS: "2000"
          RUBY_BOX: ${{ matrix.ruby_box }}
          RUBYOPT: ${{ matrix.rubyopt }}
      - run: bundle exec rubocop
        if: ${{ !startsWith(matrix.ruby, 'truffleruby') && !startsWith(matrix.ruby, 'jruby') && !matrix.rubyopt }}

  test-32bit:
    name: test (${{ matrix.ruby }} · 32-bit)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.4", "4.0"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: assert 32-bit interpreter
        run: |
          docker run --rm --platform linux/386 \
            i386/ruby:${{ matrix.ruby }} \
            ruby -e 'puts "#{RUBY_DESCRIPTION}, #{1.size * 8}-bit word"; abort "not 32-bit" unless 1.size == 4'
      - name: test under 32-bit Ruby
        run: |
          docker run --rm --platform linux/386 \
            -v "$PWD:/work" -w /work \
            i386/ruby:${{ matrix.ruby }} \
            sh -c 'bundle install && bundle exec rake test'
